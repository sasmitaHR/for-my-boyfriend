<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Favorite Person ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe6eb,#fff8f2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    max-width:500px;
}

h1{
    color:#ff4d6d;
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#ff2d55;
}

#message{
    margin-top:25px;
    font-size:22px;
    color:#444;
}
</style>

</head>

<body>

<div class="card">

<h1>Hi Handsome ❤️</h1>

<p>I made this little surprise just for you.</p>

<button onclick="showMessage()">Click Me 😊</button>

<div id="message"></div>

</div>

<script>

const messages = [
"You're my favorite person ❤️",
"You make my world brighter ☀️",
"I still smile every time I see your name 😊",
"You deserve unlimited hugs 🤗",
"Certified: World's Best Boyfriend 🏆",
"I love you more than Maggie 🍜❤️",
"Thank you for being you 💕"
];

function showMessage(){
    const random = Math.floor(Math.random()*messages.length);
    document.getElementById("message").innerHTML = messages[random];
}

</script>

</body>
</html>
